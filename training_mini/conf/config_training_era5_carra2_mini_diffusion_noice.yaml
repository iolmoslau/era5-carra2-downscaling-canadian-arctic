# SPDX-License-Identifier: Apache-2.0
# CorrDiff-Mini DIFFUSION for ERA5 -> CARRA2, WITHOUT sea ice (11 LR channels: drop siconc).
# Requires the matching no-ice regression checkpoint.
# Launch from training_mini/:
#   python train.py --config-name=config_training_era5_carra2_mini_diffusion_noice \
#       ++training.io.regression_checkpoint_path=/path/to/regression_noice.mdlus

hydra:
    job:
        chdir: false
        name: era5_carra2_mini_diffusion_noice
    run:
        dir: ./output/${hydra:job.name}
    searchpath:
        - pkg://conf/base # Do not modify

defaults:
    - dataset: era5_carra2
    - model: diffusion
    - model_size: mini
    - training: ${model}

dataset:
    data_path: ./data
    stats_path: ./data/stats_train_2011_2018.json
    years: [2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018]
    lr_channels: [t2m, u10, v10, t500, t850, z500, z850, u500, u850, v500, v850]  # no siconc

validation:
    years: [2019]

training:
    hp:
        training_duration: 8000000
        total_batch_size: 64
        batch_size_per_gpu: 4
    io:
        regression_checkpoint_path: ???   # override at submit time (see header)
        print_progress_freq: 1000
        save_checkpoint_freq: 5000
        validation_freq: 5000

wandb:
    mode: offline
    results_dir: ./wandb
    watch_model: false
